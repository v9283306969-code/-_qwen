# Gitleaks Configuration — MLECP
title = "MLECP gitleaks config"

# Разрешаем найденные "секреты" — это тестовые заглушки, не попадут в production

[allowlist]
description = "Global allowlist for test secrets and docs"
paths = [
    '''node_modules''',
    '''.pnpm-store''',
    '''pnpm-lock\.yaml''',
    '''.git''',
    '''coverage''',
    '''dist''',
    '''build''',
    '''docs/''',
    '''templates/''',
    '''prompts-drafts/''',
    '''\.md$''',
    '''.env.example''',
]
