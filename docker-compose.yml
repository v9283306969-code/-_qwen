# ======================
# MLECP — Docker Compose (Production-like)
# ======================
# Запуск: docker-compose up -d
# Остановка: docker-compose down
# Очистка volumes: docker-compose down -v
# ======================

version: '3.9'

services:

  # ======================
  # ИНФРАСТРУКТУРА
  # ======================

  # База данных PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: mlecp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-dev}
      POSTGRES_PASSWORD: ${DB_PASS:-dev_password_change_me}
      POSTGRES_DB: ${DB_NAME:-mlecp_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dev} -d ${DB_NAME:-mlecp_dev}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - mlecp-network

  # Кэш и очереди Redis
  redis:
    image: redis:7-alpine
    container_name: mlecp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - mlecp-network

  # Headless CMS (Strapi) — отдельная БД
  strapi:
    image: node:20-alpine
    container_name: mlecp-strapi
    working_dir: /app
    # В production заменить на build из папки стрapi-проекта
    command: >
      sh -c "
        if [ ! -f package.json ]; then
          npm init -y &&
          npm install @strapi/strapi@latest &&
          npx strapi new . --quickstart --no-run;
        fi &&
        npm run develop
      "
    environment:
      NODE_ENV: development
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi
      DATABASE_USERNAME: ${DB_USER:-dev}
      DATABASE_PASSWORD: ${DB_PASS:-dev_password_change_me}
      JWT_SECRET: ${JWT_SECRET:-change_me_super_secret_key_123}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-change_me_strapi_admin_secret}
      APP_KEYS: ${APP_KEYS:-temp_key_1,temp_key_2}
    ports:
      - "1337:1337"
    volumes:
      # Монтируем папку strapi для dev-режима (live-reload)
      - ./services/strapi:/app
      - strapi_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1337/admin || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - mlecp-network

  # ======================
  # МИКРОСЕРВИСЫ
  # ======================

  # API Gateway (GraphQL)
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: mlecp-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-dev}:${DB_PASS:-dev_password_change_me}@postgres:5432/${DB_NAME:-mlecp_dev}
      REDIS_URL: redis://redis:6379
      GATEWAY_PORT: ${GATEWAY_PORT:-4000}
      PRODUCT_SERVICE_URL: http://product-service:3001
      ORDER_SERVICE_URL: http://order-service:3002
      PARTNER_SERVICE_URL: http://partner-service:3003
      STRAPI_URL: http://strapi:1337
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "4000:${GATEWAY_PORT:-4000}" # GraphQL endpoint
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${GATEWAY_PORT:-4000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mlecp-network

  # Product Service (Node.js + NestJS)
  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: mlecp-product-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-dev}:${DB_PASS:-dev_password_change_me}@postgres:5432/${DB_NAME:-mlecp_dev}?schema=product
      REDIS_URL: redis://redis:6379
      SERVICE_PORT: ${PRODUCT_SERVICE_PORT:-3001}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3001:${PRODUCT_SERVICE_PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PRODUCT_SERVICE_PORT:-3001}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mlecp-network

  # Order Service (Node.js + NestJS)
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: mlecp-order-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-dev}:${DB_PASS:-dev_password_change_me}@postgres:5432/${DB_NAME:-mlecp_dev}?schema=orders
      REDIS_URL: redis://redis:6379
      SERVICE_PORT: ${ORDER_SERVICE_PORT:-3002}
      PRODUCT_SERVICE_URL: http://product-service:3001
      PARTNER_SERVICE_URL: http://partner-service:3003
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      YOOKASSA_RETURN_URL: ${YOOKASSA_RETURN_URL:-http://localhost:3000/checkout/success}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3002:${ORDER_SERVICE_PORT:-3002}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${ORDER_SERVICE_PORT:-3002}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mlecp-network

  # Partner Service (Python + FastAPI)
  partner-service:
    build:
      context: ./services/partner-service
      dockerfile: Dockerfile
    container_name: mlecp-partner-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-dev}:${DB_PASS:-dev_password_change_me}@postgres:5432/${DB_NAME:-mlecp_dev}?schema=partner
      REDIS_URL: redis://redis:6379
      SERVICE_PORT: ${PARTNER_SERVICE_PORT:-3003}
      STRAPI_URL: http://strapi:1337
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3003:${PARTNER_SERVICE_PORT:-3003}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PARTNER_SERVICE_PORT:-3003}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mlecp-network

  # ======================
  # VOLUMES & NETWORKS
  # ======================

volumes:
  pgdata:
    driver: local
  strapi_node_modules:

networks:
  mlecp-network:
    driver: bridge
